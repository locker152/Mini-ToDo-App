<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./minitodoapp-css.css">
</head>
<body>
    <h1 style="text-align: center;">个人任务管理</h1>

    <label class="input-tabel" >请输入要添加的任务：
        <input id="input-class" placeholder="请输入任务">
        <button class="add-button" onclick="addTask()">添加</button>
    </label>
        
    <table class="elemen-tabel" id="table-element"> 
        <tr>
            <th>任务名称</th>
            <th>任务状态</th>
        </tr>
        <tbody>
        <tr>
            <td>暂无任务</td>
            <td class="state" ><input type="radio" name="choice_0">完成 <input type="radio" name="choice_0">未完成</td>
        </tr>
        </tbody>
    </table>
    <script src="./minitodoapp-js.js"></script>
</body>
</html>
